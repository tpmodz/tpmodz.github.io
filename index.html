<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TPBLOX</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold2: #FFA500;
    --orange: #FF6B00;
    --orange2: #FF4500;
    --bg: #0A0A12;
    --bg2: #0F0F1E;
    --panel: #13132A;
    --panel2: #1A1A35;
    --glow-gold: 0 0 20px #FFD700aa, 0 0 40px #FFA50066;
    --glow-orange: 0 0 20px #FF6B00aa, 0 0 40px #FF450066;
    --cell: 44px;
    --cell-m: 38px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Exo 2', sans-serif;
    color: #fff;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, #FF6B0015 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, #FFD70010 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, #1A1A3500 0%, #0A0A12 80%);
    pointer-events: none; z-index: 0;
  }

  #app {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 12px 8px 8px;
    gap: 10px;
  }

  /* Header */
  #header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }
  #logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 26px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--orange2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 12px #FFD70088);
    letter-spacing: 3px;
  }
  .score-box {
    background: var(--panel2);
    border: 1px solid #FFD70033;
    border-radius: 12px;
    padding: 6px 14px;
    text-align: center;
    min-width: 90px;
    box-shadow: 0 2px 12px #FFD70020;
  }
  .score-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--gold2);
    text-transform: uppercase;
    font-weight: 700;
  }
  .score-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
  }
  #combo-display {
    position: absolute;
    top: 60px; left: 50%; transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
    text-shadow: var(--glow-gold);
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
    transition: opacity 0.3s;
  }
  #combo-display.show {
    animation: comboPop 1.4s ease-out forwards;
  }
  @keyframes comboPop {
    0%   { opacity: 0; transform: translateX(-50%) scale(0.5) translateY(0); }
    20%  { opacity: 1; transform: translateX(-50%) scale(1.3) translateY(-10px); }
    60%  { opacity: 1; transform: translateX(-50%) scale(1.1) translateY(-20px); }
    100% { opacity: 0; transform: translateX(-50%) scale(0.9) translateY(-40px); }
  }

  /* Board */
  #board-wrap {
    position: relative;
    background: var(--panel);
    border-radius: 20px;
    padding: 10px;
    border: 1.5px solid #FFD70030;
    box-shadow:
      0 0 0 1px #FF6B0015,
      0 8px 40px #00000080,
      inset 0 1px 0 #ffffff08;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(8, var(--cell));
    grid-template-rows: repeat(8, var(--cell));
    gap: 3px;
    position: relative;
  }
  .cell {
    width: var(--cell);
    height: var(--cell);
    background: #0D0D22;
    border-radius: 6px;
    border: 1px solid #FFFFFF0A;
    position: relative;
    transition: background 0.15s;
  }
  .cell.filled {
    border-color: transparent;
  }
  .cell.preview-valid {
    background: #FFD70055 !important;
    border-color: var(--gold) !important;
    box-shadow: inset 0 0 8px #FFD70066;
  }
  .cell.preview-invalid {
    background: #FF000044 !important;
    border-color: #FF4444 !important;
  }

  /* Pieces tray */
  #tray {
    width: 100%;
    background: var(--panel);
    border-radius: 18px;
    border: 1.5px solid #FFD70020;
    padding: 12px 8px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    gap: 6px;
    min-height: 90px;
    box-shadow: 0 4px 24px #00000060;
  }
  .piece-slot {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80px;
    position: relative;
  }
  .piece-container {
    cursor: grab;
    position: relative;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), filter 0.15s;
    transform-origin: center;
  }
  .piece-container:active { cursor: grabbing; }
  .piece-container.lifting {
    transform: scale(1.15);
    filter: drop-shadow(0 0 14px var(--gold));
    z-index: 50;
  }
  .piece-grid {
    display: grid;
    gap: 2px;
  }
  .piece-cell {
    border-radius: 4px;
    width: 16px; height: 16px;
  }

  /* Dragging ghost */
  #drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    display: none;
    transform-origin: top left;
  }
  #drag-ghost .piece-grid { gap: 3px; }
  #drag-ghost .piece-cell { width: var(--cell); height: var(--cell); border-radius: 6px; }

  /* Particles */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9990;
    animation: particleFly var(--dur) ease-out forwards;
  }
  @keyframes particleFly {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }
  .cell-clear {
    animation: cellClear 0.4s ease-out forwards;
  }
  @keyframes cellClear {
    0%   { transform: scale(1); opacity: 1; filter: brightness(1); }
    50%  { transform: scale(1.3); opacity: 1; filter: brightness(2) saturate(2); }
    100% { transform: scale(0); opacity: 0; }
  }

  /* Game Over */
  #gameover-overlay {
    display: none;
    position: fixed; inset: 0;
    background: #000000CC;
    backdrop-filter: blur(8px);
    z-index: 10000;
    align-items: center;
    justify-content: center;
  }
  #gameover-overlay.show { display: flex; }
  #gameover-box {
    background: linear-gradient(135deg, #13132A, #1A1A35);
    border: 1.5px solid #FFD70066;
    border-radius: 24px;
    padding: 36px 40px;
    text-align: center;
    box-shadow: 0 0 60px #FFD70033, 0 20px 60px #00000080;
    animation: popIn 0.4s cubic-bezier(.34,1.56,.64,1);
    max-width: 320px; width: 90%;
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  #gameover-box h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--orange2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 10px #FFD70088);
    margin-bottom: 16px;
  }
  .go-stat { margin: 8px 0; font-size: 15px; color: #ccc; }
  .go-stat span { color: var(--gold); font-weight: 700; font-size: 20px; }
  #btn-restart {
    margin-top: 24px;
    background: linear-gradient(135deg, var(--gold), var(--orange));
    border: none; border-radius: 14px;
    padding: 14px 40px;
    font-family: 'Orbitron', sans-serif;
    font-size: 16px; font-weight: 700;
    color: #000; cursor: pointer;
    box-shadow: 0 4px 20px #FFD70066;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
  }
  #btn-restart:hover { transform: scale(1.05); box-shadow: 0 6px 30px #FFD70099; }
  #btn-restart:active { transform: scale(0.97); }

  /* Mobile */
  @media (max-width: 420px) {
    :root {
      --cell: 36px;
    }
    #logo { font-size: 20px; }
    .score-box { min-width: 74px; padding: 5px 10px; }
    .score-value { font-size: 15px; }
    #board-wrap { padding: 7px; }
    .cell { border-radius: 5px; }
    .piece-cell { width: 13px; height: 13px; }
  }
  @media (max-width: 360px) {
    :root { --cell: 32px; }
    .piece-cell { width: 12px; height: 12px; }
  }

  /* Score pop */
  .score-pop {
    position: fixed;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    color: var(--gold);
    pointer-events: none;
    z-index: 9995;
    animation: scorePop 1s ease-out forwards;
    font-size: 20px;
    text-shadow: 0 0 12px var(--gold);
  }
  @keyframes scorePop {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
  }

  /* Glow line effect */
  .line-glow {
    position: absolute;
    pointer-events: none;
    background: linear-gradient(90deg, transparent, #FFD700, #FF6B00, #FFD700, transparent);
    animation: lineGlow 0.35s ease-out forwards;
    z-index: 5;
    border-radius: 4px;
  }
  .col-glow {
    background: linear-gradient(180deg, transparent, #FFD700, #FF6B00, #FFD700, transparent);
  }
  @keyframes lineGlow {
    0%   { opacity: 0.9; transform: scaleX(1); }
    100% { opacity: 0; transform: scaleX(1.05); }
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo">TPBLOX</div>
    <div class="score-box">
      <div class="score-label">SCORE</div>
      <div class="score-value" id="score-val">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">BEST</div>
      <div class="score-value" id="best-val">0</div>
    </div>
  </div>

  <div id="combo-display"></div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div id="tray">
    <div class="piece-slot" id="slot-0"></div>
    <div class="piece-slot" id="slot-1"></div>
    <div class="piece-slot" id="slot-2"></div>
  </div>
</div>

<!-- Drag ghost -->
<div id="drag-ghost">
  <div class="piece-grid" id="ghost-grid"></div>
</div>

<!-- Game Over -->
<div id="gameover-overlay">
  <div id="gameover-box">
    <h2>GAME OVER</h2>
    <div class="go-stat">SCORE: <span id="go-score">0</span></div>
    <div class="go-stat">BEST: <span id="go-best">0</span></div>
    <button id="btn-restart">PLAY AGAIN</button>
  </div>
</div>

<script>
// ============ AUDIO ============
const AUDIO_PATHS = {
  hehe:  'mt/hehe.mp3',
  bum:   'mt/bum.mp3',
  doang: 'mt/doang.mp3'
};
const audioCache = {};
function loadAudio(key) {
  if (audioCache[key]) return audioCache[key];
  const a = new Audio(AUDIO_PATHS[key]);
  a.preload = 'auto';
  audioCache[key] = a;
  return a;
}
function playSound(key) {
  try {
    const a = loadAudio(key);
    const clone = a.cloneNode();
    clone.volume = 0.85;
    clone.play().catch(() => {});
  } catch(e) {}
}
// Preload
['hehe','bum','doang'].forEach(loadAudio);

// ============ COLORS ============
const BLOCK_COLORS = [
  { bg: 'linear-gradient(135deg,#FFD700,#FF8C00)', shadow: '#FFD700' },
  { bg: 'linear-gradient(135deg,#FF4500,#FF6B00)', shadow: '#FF6B00' },
  { bg: 'linear-gradient(135deg,#00E5FF,#0080FF)', shadow: '#00E5FF' },
  { bg: 'linear-gradient(135deg,#FF00E5,#AA00FF)', shadow: '#FF00E5' },
  { bg: 'linear-gradient(135deg,#00FF88,#00CCAA)', shadow: '#00FF88' },
  { bg: 'linear-gradient(135deg,#FF3355,#FF0080)', shadow: '#FF3355' },
  { bg: 'linear-gradient(135deg,#FFEB3B,#FF9800)', shadow: '#FFEB3B' },
];

// ============ PIECE SHAPES ============
const SHAPES = [
  // 1x1
  [[1]],
  // 1x2
  [[1,1]],
  // 2x1
  [[1],[1]],
  // 1x3
  [[1,1,1]],
  // 3x1
  [[1],[1],[1]],
  // 2x2
  [[1,1],[1,1]],
  // L
  [[1,0],[1,0],[1,1]],
  // J
  [[0,1],[0,1],[1,1]],
  // T
  [[1,1,1],[0,1,0]],
  // S
  [[0,1,1],[1,1,0]],
  // Z
  [[1,1,0],[0,1,1]],
  // 1x4
  [[1,1,1,1]],
  // 4x1
  [[1],[1],[1],[1]],
  // 2x3
  [[1,1],[1,1],[1,1]],
  // corner
  [[1,1],[1,0]],
  [[1,1],[0,1]],
  [[1,0],[1,1]],
  [[0,1],[1,1]],
  // 3x3 cross
  [[0,1,0],[1,1,1],[0,1,0]],
  // 3x2
  [[1,1,1],[1,0,0]],
  [[1,1,1],[0,0,1]],
];

// ============ GAME STATE ============
const GRID = 8;
let board = [];         // 8x8, each cell = colorIdx or -1
let pieces = [];        // [{shape, colorIdx, el, slot}]
let score = 0;
let highScore = parseInt(localStorage.getItem('tpblox_hs') || '0');
let comboCount = 0;

// Drag state
let drag = {
  active: false,
  pieceIdx: -1,
  shape: null,
  colorIdx: -1,
  cellSize: 0,
  // offset from top-left of ghost to pointer
  offsetX: 0,
  offsetY: 0,
  // current pointer pos
  px: 0, py: 0,
  previewR: -1, previewC: -1,
  valid: false
};

const boardEl = document.getElementById('board');
const ghost = document.getElementById('drag-ghost');
const ghostGrid = document.getElementById('ghost-grid');
const scoreEl = document.getElementById('score-val');
const bestEl = document.getElementById('best-val');
const comboDisp = document.getElementById('combo-display');
const gameoverOverlay = document.getElementById('gameover-overlay');

// ============ INIT ============
function initBoard() {
  board = Array.from({length:GRID}, () => Array(GRID).fill(-1));
  boardEl.innerHTML = '';
  for (let r=0; r<GRID; r++)
    for (let c=0; c<GRID; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r; cell.dataset.c = c;
      boardEl.appendChild(cell);
    }
}

function getCellEl(r,c) {
  return boardEl.children[r*GRID+c];
}

function getCellSize() {
  const c = boardEl.children[0];
  return c ? c.getBoundingClientRect().width + 3 : 47;
}

// ============ PIECES ============
function randomPiece() {
  const shape = SHAPES[Math.floor(Math.random()*SHAPES.length)];
  const colorIdx = Math.floor(Math.random()*BLOCK_COLORS.length);
  return { shape, colorIdx };
}

function renderPieceTray() {
  for (let i=0; i<3; i++) {
    const slot = document.getElementById('slot-'+i);
    slot.innerHTML = '';
    if (!pieces[i] || pieces[i].used) continue;
    const p = pieces[i];
    const rows = p.shape.length, cols = p.shape[0].length;
    const div = document.createElement('div');
    div.className = 'piece-container';
    div.dataset.idx = i;
    const grid = document.createElement('div');
    grid.className = 'piece-grid';
    grid.style.gridTemplateColumns = `repeat(${cols},16px)`;
    grid.style.gridTemplateRows = `repeat(${rows},16px)`;
    for (let r=0; r<rows; r++)
      for (let c=0; c<cols; c++) {
        const cell = document.createElement('div');
        cell.className = 'piece-cell';
        if (p.shape[r][c]) {
          cell.style.background = BLOCK_COLORS[p.colorIdx].bg;
          cell.style.boxShadow = `0 0 6px ${BLOCK_COLORS[p.colorIdx].shadow}88`;
        } else {
          cell.style.background = 'transparent';
        }
        grid.appendChild(cell);
      }
    div.appendChild(grid);
    slot.appendChild(div);
    p.el = div;

    // Events
    div.addEventListener('mousedown', e => startDrag(e, i, false));
    div.addEventListener('touchstart', e => startDrag(e, i, true), {passive:false});
  }
}

function fillTray() {
  pieces = [randomPiece(), randomPiece(), randomPiece()];
  renderPieceTray();
  // Check if any piece can be placed
  if (!anyPiecePlaceable()) {
    triggerGameOver();
  }
}

function anyPiecePlaceable() {
  for (let i=0;i<3;i++) {
    if (!pieces[i] || pieces[i].used) continue;
    if (canPlaceAnywhere(pieces[i].shape)) return true;
  }
  return false;
}

function canPlaceAnywhere(shape) {
  for (let r=0; r<=GRID-shape.length; r++)
    for (let c=0; c<=GRID-shape[0].length; c++)
      if (canPlace(shape, r, c)) return true;
  return false;
}

function canPlace(shape, r, c) {
  for (let dr=0; dr<shape.length; dr++)
    for (let dc=0; dc<shape[0].length; dc++)
      if (shape[dr][dc]) {
        const nr=r+dr, nc=c+dc;
        if (nr<0||nr>=GRID||nc<0||nc>=GRID) return false;
        if (board[nr][nc] !== -1) return false;
      }
  return true;
}

// ============ DRAG ============
function getPointerPos(e, isTouch) {
  if (isTouch) {
    const t = e.touches[0] || e.changedTouches[0];
    return { x: t.clientX, y: t.clientY };
  }
  return { x: e.clientX, y: e.clientY };
}

function startDrag(e, idx, isTouch) {
  if (e.cancelable) e.preventDefault();
  if (drag.active) return;

  const p = pieces[idx];
  if (!p || p.used) return;
  const cs = getCellSize();

  const pos = getPointerPos(e, isTouch);
  const rect = p.el.getBoundingClientRect();

  drag.active = true;
  drag.pieceIdx = idx;
  drag.shape = p.shape;
  drag.colorIdx = p.colorIdx;
  drag.cellSize = cs;
  // Center ghost on pointer
  const rows = p.shape.length, cols = p.shape[0].length;
  drag.offsetX = (cols * (cs+3)) / 2;
  drag.offsetY = (rows * (cs+3)) / 2;
  drag.px = pos.x;
  drag.py = pos.y;
  drag.previewR = -1; drag.previewC = -1;
  drag.valid = false;

  p.el.classList.add('lifting');
  p.el.style.opacity = '0.3';

  // Build ghost
  buildGhost(p.shape, p.colorIdx, cs);
  ghost.style.display = 'block';
  updateGhostPos(pos.x, pos.y);
  updatePreview(pos.x, pos.y);
}

function buildGhost(shape, colorIdx, cs) {
  ghostGrid.innerHTML = '';
  const rows = shape.length, cols = shape[0].length;
  ghostGrid.style.gridTemplateColumns = `repeat(${cols},${cs}px)`;
  ghostGrid.style.gridTemplateRows = `repeat(${rows},${cs}px)`;
  for (let r=0; r<rows; r++)
    for (let c=0; c<cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'piece-cell';
      cell.style.width = cs+'px';
      cell.style.height = cs+'px';
      cell.style.borderRadius = '6px';
      if (shape[r][c]) {
        cell.style.background = BLOCK_COLORS[colorIdx].bg;
        cell.style.boxShadow = `0 0 10px ${BLOCK_COLORS[colorIdx].shadow}`;
        cell.style.opacity = '0.85';
      } else {
        cell.style.background = 'transparent';
      }
      ghostGrid.appendChild(cell);
    }
}

function updateGhostPos(px, py) {
  ghost.style.left = (px - drag.offsetX) + 'px';
  ghost.style.top  = (py - drag.offsetY) + 'px';
}

function getBoardCell(px, py) {
  const boardRect = boardEl.getBoundingClientRect();
  const cs = drag.cellSize;
  const gap = 3;
  const step = cs + gap;
  const localX = px - boardRect.left;
  const localY = py - boardRect.top;
  const rows = drag.shape.length, cols = drag.shape[0].length;
  // Snap: find top-left corner of shape
  const shapeW = cols * step - gap;
  const shapeH = rows * step - gap;
  const tlX = localX - shapeW/2;
  const tlY = localY - shapeH/2;
  const c = Math.round(tlX / step);
  const r = Math.round(tlY / step);
  return { r, c };
}

function updatePreview(px, py) {
  // Clear old preview
  clearPreview();
  const { r, c } = getBoardCell(px, py);
  drag.previewR = r; drag.previewC = c;
  const valid = canPlace(drag.shape, r, c);
  drag.valid = valid;

  for (let dr=0; dr<drag.shape.length; dr++)
    for (let dc=0; dc<drag.shape[0].length; dc++)
      if (drag.shape[dr][dc]) {
        const nr=r+dr, nc=c+dc;
        if (nr>=0&&nr<GRID&&nc>=0&&nc<GRID) {
          const cell = getCellEl(nr,nc);
          cell.classList.add(valid ? 'preview-valid' : 'preview-invalid');
        }
      }
}

function clearPreview() {
  document.querySelectorAll('.preview-valid,.preview-invalid').forEach(el=>{
    el.classList.remove('preview-valid','preview-invalid');
  });
}

function onMove(e, isTouch) {
  if (!drag.active) return;
  if (e.cancelable) e.preventDefault();
  const pos = getPointerPos(e, isTouch);
  drag.px = pos.x; drag.py = pos.y;
  updateGhostPos(pos.x, pos.y);
  updatePreview(pos.x, pos.y);
}

function onEnd(e, isTouch) {
  if (!drag.active) return;
  if (e.cancelable) e.preventDefault();
  const p = pieces[drag.pieceIdx];

  clearPreview();
  ghost.style.display = 'none';

  if (drag.valid && drag.previewR >= 0) {
    // Place piece
    placePiece(drag.shape, drag.colorIdx, drag.previewR, drag.previewC);
    p.used = true;
    p.el.style.display = 'none';

    // Check clears
    checkAndClear();

    // Refill if all used
    if (pieces.every(pp => !pp || pp.used)) {
      setTimeout(fillTray, 300);
    } else {
      // Check if remaining pieces can be placed
      if (!anyPiecePlaceable()) {
        setTimeout(triggerGameOver, 500);
      }
    }
  } else {
    // Return animation
    if (p && p.el) {
      p.el.classList.remove('lifting');
      p.el.style.opacity = '';
      p.el.style.animation = 'returnBounce 0.4s cubic-bezier(.34,1.56,.64,1)';
      setTimeout(()=> { if(p.el) p.el.style.animation=''; }, 400);
    }
  }

  if (p && p.el) {
    p.el.classList.remove('lifting');
    p.el.style.opacity = p.used ? '' : '';
  }

  drag.active = false;
  drag.pieceIdx = -1;
}

// ============ PLACE & CLEAR ============
function placePiece(shape, colorIdx, r, c) {
  for (let dr=0; dr<shape.length; dr++)
    for (let dc=0; dc<shape[0].length; dc++)
      if (shape[dr][dc]) {
        board[r+dr][c+dc] = colorIdx;
        const cell = getCellEl(r+dr, c+dc);
        cell.classList.add('filled');
        cell.style.background = BLOCK_COLORS[colorIdx].bg;
        cell.style.boxShadow = `inset 0 1px 0 #ffffff30, 0 0 8px ${BLOCK_COLORS[colorIdx].shadow}66`;
        cell.style.borderColor = 'transparent';
      }
}

function checkAndClear() {
  const rowsToClear = [];
  const colsToClear = [];

  for (let r=0; r<GRID; r++)
    if (board[r].every(v=>v!==-1)) rowsToClear.push(r);
  for (let c=0; c<GRID; c++)
    if (board.every(row=>row[c]!==-1)) colsToClear.push(c);

  const total = rowsToClear.length + colsToClear.length;
  if (total === 0) { comboCount = 0; return; }

  comboCount++;

  // Collect all cells to clear
  const cellsToAnimate = new Set();
  rowsToClear.forEach(r => {
    for (let c=0; c<GRID; c++) cellsToAnimate.add(r*GRID+c);
  });
  colsToClear.forEach(c => {
    for (let r=0; r<GRID; r++) cellsToAnimate.add(r*GRID+c);
  });

  // Line glow effect
  const boardRect = boardEl.getBoundingClientRect();
  const cs = getCellSize();
  rowsToClear.forEach(r => {
    const glow = document.createElement('div');
    glow.className = 'line-glow';
    glow.style.position = 'fixed';
    glow.style.left = boardRect.left+'px';
    glow.style.top = (boardRect.top + r*(cs+3))+'px';
    glow.style.width = boardRect.width+'px';
    glow.style.height = cs+'px';
    document.body.appendChild(glow);
    setTimeout(()=>glow.remove(), 400);
  });
  colsToClear.forEach(c => {
    const glow = document.createElement('div');
    glow.className = 'line-glow col-glow';
    glow.style.position = 'fixed';
    glow.style.left = (boardRect.left + c*(cs+3))+'px';
    glow.style.top = boardRect.top+'px';
    glow.style.width = cs+'px';
    glow.style.height = boardRect.height+'px';
    document.body.appendChild(glow);
    setTimeout(()=>glow.remove(), 400);
  });

  // Animate cells
  cellsToAnimate.forEach(idx => {
    const cell = boardEl.children[idx];
    const r = Math.floor(idx/GRID), c = idx%GRID;
    const colorIdx = board[r][c];
    cell.classList.add('cell-clear');
    // Particles
    spawnParticles(cell, colorIdx);
  });

  // Score
  let pts = total * 100;
  if (comboCount > 1) pts = Math.floor(pts * (1 + comboCount * 0.5));
  addScore(pts);

  // Show combo
  if (comboCount >= 2) showCombo(comboCount, pts);

  // Sound
  const isBoardClear = willBoardBeClear(rowsToClear, colsToClear);
  if (isBoardClear) {
    setTimeout(()=>playSound('doang'), 200);
  } else if (total >= 3) {
    playSound('bum');
  } else {
    playSound('hehe');
  }

  // Clear board after anim
  setTimeout(() => {
    cellsToAnimate.forEach(idx => {
      const cell = boardEl.children[idx];
      const r = Math.floor(idx/GRID), c = idx%GRID;
      board[r][c] = -1;
      cell.classList.remove('filled','cell-clear');
      cell.style.background = '';
      cell.style.boxShadow = '';
      cell.style.borderColor = '';
    });
  }, 380);
}

function willBoardBeClear(rows, cols) {
  // Check if after clearing, board is empty
  let tempBoard = board.map(r=>[...r]);
  rows.forEach(r => { for(let c=0;c<GRID;c++) tempBoard[r][c]=-1; });
  cols.forEach(c => { for(let r=0;r<GRID;r++) tempBoard[r][c]=-1; });
  return tempBoard.every(row=>row.every(v=>v===-1));
}

function spawnParticles(cell, colorIdx) {
  const rect = cell.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const color = BLOCK_COLORS[colorIdx >= 0 ? colorIdx : 0].shadow;
  const count = 8;
  for (let i=0; i<count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i/count)*2*Math.PI + Math.random()*0.5;
    const dist = 40 + Math.random()*60;
    const tx = Math.cos(angle)*dist;
    const ty = Math.sin(angle)*dist;
    const size = 4 + Math.random()*6;
    p.style.cssText = `
      left:${cx-size/2}px; top:${cy-size/2}px;
      width:${size}px; height:${size}px;
      background:${color};
      box-shadow:0 0 6px ${color};
      --tx:${tx}px; --ty:${ty}px;
      --dur:${0.5+Math.random()*0.4}s;
    `;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 900);
  }
}

function addScore(pts) {
  score += pts;
  scoreEl.textContent = score;
  scoreEl.style.animation = 'none';
  void scoreEl.offsetWidth;
  scoreEl.style.animation = 'scorePulse 0.3s ease-out';
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('tpblox_hs', highScore);
    bestEl.textContent = highScore;
  }
  // Score pop
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = '+'+pts;
  const sr = document.getElementById('score-val').getBoundingClientRect();
  pop.style.left = (sr.left+sr.width/2-20)+'px';
  pop.style.top = (sr.top-10)+'px';
  document.body.appendChild(pop);
  setTimeout(()=>pop.remove(), 1000);
}

function showCombo(count, pts) {
  comboDisp.textContent = `🔥 COMBO x${count}! +${pts}`;
  comboDisp.className = '';
  void comboDisp.offsetWidth;
  comboDisp.className = 'show';
}

// ============ GAME OVER ============
function triggerGameOver() {
  document.getElementById('go-score').textContent = score;
  document.getElementById('go-best').textContent = highScore;
  gameoverOverlay.classList.add('show');
}

document.getElementById('btn-restart').addEventListener('click', () => {
  gameoverOverlay.classList.remove('show');
  score = 0;
  comboCount = 0;
  scoreEl.textContent = '0';
  bestEl.textContent = highScore;
  initBoard();
  fillTray();
});

// ============ EVENTS ============
document.addEventListener('mousemove', e => onMove(e, false));
document.addEventListener('mouseup',   e => onEnd(e, false));
document.addEventListener('touchmove', e => onMove(e, true),  {passive:false});
document.addEventListener('touchend',  e => onEnd(e, true),   {passive:false});
document.addEventListener('touchcancel', e => onEnd(e, true), {passive:false});

// ============ SCORE PULSE CSS ============
const style = document.createElement('style');
style.textContent = `@keyframes scorePulse{0%{transform:scale(1)}50%{transform:scale(1.25);color:var(--gold);}100%{transform:scale(1)}}`;
document.head.appendChild(style);

// ============ START ============
bestEl.textContent = highScore;
initBoard();
fillTray();
</script>
</body>
</html>
