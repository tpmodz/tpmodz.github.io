<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TP MODZ - DOG RACING FAIR PLAY</title>
    <style>
        :root { --border: #2d3436; }
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }

        /* Menu Panel giữa màn hình */
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2000; display: flex;
            align-items: center; justify-content: center;
        }
        .menu-card {
            background: #fff; padding: 25px; border: 6px solid var(--border);
            border-radius: 20px; width: 420px; box-shadow: 10px 10px 0 var(--border);
            text-align: center;
        }
        .menu-card h2 { font-weight: 900; margin: 0 0 15px 0; color: #d63031; }
        textarea, input {
            width: 100%; padding: 12px; border: 4px solid var(--border);
            border-radius: 10px; font-weight: 900; box-sizing: border-box; margin-bottom: 10px;
        }
        #start-btn {
            width: 100%; padding: 15px; background: #ff7675; color: white;
            border: 4px solid var(--border); border-radius: 12px;
            font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 4px 4px 0 #000;
        }

        /* Nền làng Doraemon tĩnh */
        #game-view {
            position: relative; width: 100vw; height: 100vh;
            background: url('mt/anhnendog.png') no-repeat center center;
            background-size: cover;
        }

        /* ĐƯỜNG ĐUA ĐẤT THẬT (Texture gồ ghề) */
        #track-layer {
            position: absolute; bottom: 0; width: 100%; height: 42%;
            background: #8d6e63;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 38px, rgba(0,0,0,0.1) 40px),
                radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 100% 40px, 20px 20px;
            border-top: 10px solid #5d4037;
        }

        /* Chim SVG đập cánh */
        #bird-svg { position: absolute; top: 120px; left: -100px; width: 60px; z-index: 10; }
        .wing { animation: flap 0.15s infinite alternate ease-in-out; transform-origin: center; }
        @keyframes flap { from { transform: scaleY(1); } to { transform: scaleY(-0.8); } }

        /* Thực thể Chó */
        .dog-unit { position: absolute; width: 100px; height: 80px; z-index: 100; }
        .dog-name {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            background: white; border: 3px solid var(--border); padding: 2px 8px;
            border-radius: 15px; font-weight: 900; font-size: 12px; white-space: nowrap;
        }

        /* Vạch đích */
        .finish-line {
            position: absolute; right: 140px; width: 50px; height: 100%;
            background: repeating-linear-gradient(0deg, #fff, #fff 15px, #000 15px, #000 30px);
            border-left: 5px solid gold;
        }

        #victory {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; z-index: 3000;
            flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<audio id="bgm" src="mt/kid.mp3" loop></audio>

<div id="ui-overlay">
    <div class="menu-card">
        <h2>🏆 TP MODZ RACING 🏆</h2>
        <div style="text-align: left; margin-bottom: 10px;">
            <label style="font-weight: 900; font-size: 14px;">📝 DANH SÁCH TÊN:</label>
            <textarea id="nameList" placeholder="Nhập tên mỗi dòng 1 con..."></textarea>
        </div>
<b>hoặc</b>
        <div style="display:flex; gap:10px; margin-bottom:15px; text-align: left;">
            <div style="flex: 1;">
                <label style="display: block; font-weight: 900; font-size: 12px; margin-bottom: 5px;">🐶 SỐ LƯỢNG:</label>
                <input type="number" id="sl" value="10" style="width: 100%; text-align: center;">
            </div>
            <div style="flex: 1;">
                <label style="display: block; font-weight: 900; font-size: 12px; margin-bottom: 5px;">⏱️ GIÂY ĐUA:</label>
                <input type="number" id="tg" value="15" style="width: 100%; text-align: center;">
            </div>
        </div>

        <button id="start-btn" onclick="startRace()">BẮT ĐẦU ĐUA 🚀</button>
    </div>
</div>

<div id="game-view">
    <svg id="bird-svg" viewBox="0 0 100 60">
        <path d="M10 30 Q 30 10 50 30 Q 70 10 90 30" fill="none" stroke="black" stroke-width="5"/>
        <path class="wing" d="M10 30 Q 30 -20 50 30" fill="black"/>
        <path class="wing" d="M90 30 Q 70 -20 50 30" fill="black"/>
    </svg>

    <div id="track-layer">
        <div class="finish-line"></div>
        <div id="lanes-wrap"></div>
    </div>
</div>

<div id="victory">
    <h1 style="color: gold; font-size: 80px; font-weight: 900;">🏁 WINNER 🏁</h1>
    <h2 id="winner-text" style="color: white; font-size: 50px; margin-bottom: 30px;"></h2>
    <button onclick="location.reload()" style="padding: 15px 50px; font-size: 20px; font-weight: 900; cursor: pointer; border-radius: 10px;">LÀM VÁN MỚI</button>
</div>

<script>
const getDog = (c) => `
<svg viewBox="0 0 100 80">
    <path d="M20 45 Q 20 25, 40 25 L 75 25 Q 90 25, 90 40 L 90 50 Q 90 55, 85 55 L 30 55 Q 20 55, 20 45" fill="${c}" stroke="#000" stroke-width="4"/>
    <circle cx="80" cy="35" r="7" fill="#fff" stroke="#000" stroke-width="3"/>
    <circle cx="82" cy="35" r="3" fill="#000"/>
    <rect class="l" x="35" y="55" width="12" height="12" fill="#000" rx="3"/>
    <rect class="l" x="70" y="55" width="12" height="12" fill="#000" rx="3"/>
</svg>`;

window.onload = () => {
    const d = JSON.parse(localStorage.getItem('tp_dog_v8'));
    if(d) {
        document.getElementById('nameList').value = d.n;
        document.getElementById('sl').value = d.s;
        document.getElementById('tg').value = d.t;
    }
}

function startRace() {
    const raw = document.getElementById('nameList').value.trim();
    const count = parseInt(document.getElementById('sl').value);
    const limit = parseInt(document.getElementById('tg').value);
    localStorage.setItem('tp_dog_v8', JSON.stringify({n: raw, s: count, t: limit}));

    let names = raw ? raw.split('\n') : Array.from({length: count}, (_, i) => `Runner #${i+1}`);
    document.getElementById('ui-overlay').style.display = 'none';
    document.getElementById('bgm').play();

    // Chim bay
    const bird = document.getElementById('bird-svg');
    bird.animate([{ left: '-100px' }, { left: '110vw' }], { duration: 15000, iterations: Infinity });

    const wrap = document.getElementById('lanes-wrap');
    const trackH = document.getElementById('track-layer').offsetHeight;
    const lh = trackH / names.length;
    const finishLineX = window.innerWidth - 200;

    const dogs = names.map((name, i) => {
        const dBox = document.createElement('div');
        dBox.className = 'dog-unit';
        dBox.innerHTML = `<div class="dog-name">${name}</div>${getDog(`hsl(${Math.random()*360}, 80%, 65%)`)}`;
        dBox.style.top = (i * lh + (lh/2 - 40)) + 'px';
        wrap.appendChild(dBox);

        // THUẬT TOÁN: Vận tốc ngẫu nhiên không đổi suốt trận, không có "bay về đích"
        return { 
            el: dBox, name, x: 0, 
            speed: (finishLineX / (limit * (0.8 + Math.random() * 0.4))) 
        };
    });

    let lastTime = 0;
    let finished = false;

    function gameLoop(time) {
        if(!lastTime) lastTime = time;
        const dt = (time - lastTime) / 1000;
        lastTime = time;

        dogs.forEach(d => {
            if(finished) return;

            // Di chuyển thuần túy theo vận tốc đã tính, thêm chút rung nhẹ cho thật
            d.x += d.speed * dt + (Math.random() - 0.5) * 0.5;
            d.el.style.left = d.x + "px";

            // Hiệu ứng chân
            d.el.querySelectorAll('.l').forEach((leg, idx) => {
                leg.setAttribute('y', 55 + Math.sin(time/40 + idx) * 8);
            });

            if(d.x >= finishLineX) {
                finished = true;
                document.getElementById('victory').style.display = 'flex';
                document.getElementById('winner-text').innerText = d.name;
                document.getElementById('bgm').pause();
            }
        });
        if(!finished) requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
