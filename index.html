<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Nhận Độc Quyền</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Itim&family=Roboto:wght@400;700&display=swap');

        :root {
            --pastel-pink: #ffd1dc;
            --cream: #fff9f0;
            --dark-pink: #ff85a1;
            --state-red: #da251d;
            --soft-shadow: 0 10px 40px rgba(255, 133, 161, 0.25);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Itim', cursive;
            background-color: var(--cream);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #ffffff 0%, var(--pastel-pink) 100%);
            z-index: -1; opacity: 0.7;
        }

        .container {
            width: 95%; max-width: 500px;
            background: rgba(255, 255, 255, 0.98);
            padding: 30px; border-radius: 15px;
            box-shadow: var(--soft-shadow);
            text-align: center; border: 1px solid #ddd;
            position: relative; z-index: 10;
        }

        h1 { color: var(--dark-pink); margin-bottom: 20px; }

        input[type="text"] {
            width: 85%; padding: 12px; border: 2px solid var(--pastel-pink);
            border-radius: 8px; outline: none; margin-bottom: 15px;
            font-family: 'Roboto', sans-serif; text-align: center; font-size: 1rem;
        }

        .signature-wrapper { position: relative; margin-bottom: 15px; }
        #signature-pad {
            background: #fff; border: 2px solid #eee;
            border-radius: 8px; touch-action: none; cursor: crosshair;
        }
        .signature-hint {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ddd; font-size: 1.1rem; pointer-events: none;
        }

        button {
            background: var(--dark-pink); color: white; border: none;
            padding: 12px 30px; border-radius: 8px; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-family: 'Itim';
        }

        #certificate {
            display: none; background: #fff; padding: 40px 25px;
            border: 1px solid #333; position: relative;
            transform: scale(0.9); opacity: 0;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }

        .quoc-hieu { font-family: 'Roboto', sans-serif; font-weight: 700; font-size: 13px; text-transform: uppercase; line-height: 1.4; }
        .tieu-ngu { font-family: 'Roboto', sans-serif; font-weight: 700; font-size: 14px; margin-top: 2px; }
        .line-doc-lap { width: 140px; height: 1.5px; background: #000; margin: 5px auto 25px; }

        .cert-title { font-size: 22px; margin-bottom: 30px; font-family: 'Roboto', sans-serif; font-weight: 900; color: #000; letter-spacing: 1px; }
        .victim-name { font-family: 'Roboto', sans-serif; font-size: 22px; font-weight: 700; color: #000; border-bottom: 1.5px solid #000; padding: 0 5px; display: inline-block; }

        .content-text { text-align: left; font-size: 1.1rem; line-height: 1.8; font-family: 'Roboto', sans-serif; color: #333; padding: 0 10px; }

        .state-seal {
            position: absolute; bottom: 35px; left: 45px;
            width: 135px; height: 135px;
            border: 4px double var(--state-red);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transform: scale(2.5);
            pointer-events: none; z-index: 20;
        }

        .seal-text { position: absolute; width: 100%; height: 100%; color: var(--state-red); font-weight: bold; font-family: 'Roboto', sans-serif; font-size: 11px; text-transform: uppercase; }
        .seal-inner { color: var(--state-red); font-size: 35px; border: 2px solid var(--state-red); border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; }

        @keyframes stampAction {
            0% { transform: scale(2.5); opacity: 0; }
            100% { transform: scale(1) rotate(-12deg); opacity: 0.9; }
        }

        .sig-section { margin-top: 50px; text-align: right; position: relative; padding-right: 25px; }
        .final-sig-img { max-width: 150px; filter: brightness(0.6) sepia(1) hue-rotate(190deg) saturate(5); }

        .music-toggle {
            position: fixed; bottom: 20px; right: 20px;
            background: white; border-radius: 50%; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 100;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<!-- Nút bật/tắt nhạc -->
<div class="music-toggle" onclick="toggleMusic()">🎵</div>

<!-- Audio tệp amthanh.mp3 nằm trong thư mục mt -->
<audio id="mainAudio" loop src="mt/amthanh.mp3"></audio>

<div class="container" id="main-box">
    <div id="step-1">
        <h1>cho tui xin chữ ký đi >< </h1>
        <input type="text" id="userName" placeholder="Tên (họ tên đầy đủ)...">
        
        <div class="signature-wrapper">
            <div class="signature-hint" id="hint-text">Vẽ chữ ký vào đây</div>
            <canvas id="signature-pad" width="350" height="180"></canvas>
        </div>
        
        <div style="display:flex; gap:10px; justify-content:center;">
            <button onclick="clearPad()" style="background:#999;">Ký lại</button>
            <button onclick="signNow()">Đã xem và đồng ý 💌</button>
        </div>
    </div>

    <!-- GIẤY CHỨNG NHẬN -->
    <div id="certificate">
        <div class="quoc-hieu">CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</div>
        <div class="tieu-ngu">Độc lập - Tự do - Hạnh phúc</div>
        <div class="line-doc-lap"></div>
        
        <div class="cert-title">GIẤY XÁC NHẬN CHỦ QUYỀN</div>
        
        <div class="content-text">
            Kính gửi cơ sở hành chính<br>
            Tôi là: <b><span class="victim-name" id="out-name"></span></b><br>
            Bạn đã chính thức thuộc về tôi và không có sự kháng cáo.
        </div>

        <div class="sig-section">
            <p style="font-size: 14px; font-weight: bold; margin-bottom: 45px; font-family: 'Roboto';">NGƯỜI TỰ NGUYỆN</p>
            <img id="out-sig" class="final-sig-img" src="" alt="">
            
            <div class="state-seal" id="final-seal">
                <svg class="seal-text" viewBox="0 0 100 100">
                    <path id="circlePath" d="M 50, 50 m -38, 0 a 38,38 0 1,1 76,0 a 38,38 0 1,1 -76,0" fill="transparent"/>
                    <text fill="#da251d">
                        <textPath xlink:href="#circlePath" startOffset="0%">
                            THUỘC QUYỀN SỞ HỮU • KHÔNG THỂ KHÁNG CÁO •
                        </textPath>
                    </text>
                </svg>
                <div class="seal-inner">❤</div>
            </div>
        </div>
    </div>
</div>

<!-- Thư viện pháo hoa -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<script>
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint-text');
    const audio = document.getElementById('mainAudio');
    let drawing = false;

    // Điều khiển nhạc
    function toggleMusic() {
        if (audio.paused) audio.play();
        else audio.pause();
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDraw(e) { 
        drawing = true; 
        hint.style.display = 'none';
        // Tự động phát nhạc khi người dùng bắt đầu ký (để lách luật trình duyệt)
        if (audio.paused) audio.play();
        draw(e); 
    }
    
    function endDraw() { drawing = false; ctx.beginPath(); }
    
    function draw(e) {
        if (!drawing) return;
        const pos = getPos(e);
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#0000CC';
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', endDraw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    canvas.addEventListener('touchend', endDraw);

    function clearPad() { 
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        hint.style.display = 'block'; 
    }

    function launchFireworks() {
        var duration = 3 * 1000;
        var end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#ff85a1', '#ffd1dc']
            });
            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#ff85a1', '#ffd1dc']
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    }

    function signNow() {
        const name = document.getElementById('userName').value.trim();
        if(!name) { alert("Phải nhập tên nạn nhân mới đóng dấu được!"); return; }

        document.getElementById('out-name').innerText = name;
        document.getElementById('out-sig').src = canvas.toDataURL();
        
        document.getElementById('step-1').style.display = 'none';
        const cert = document.getElementById('certificate');
        cert.style.display = 'block';

        // Hiệu ứng pháo hoa bung nở khi nhấn gửi
        launchFireworks();

        setTimeout(() => {
            cert.style.transition = "all 0.6s cubic-bezier(0.23, 1, 0.32, 1)";
            cert.style.transform = "scale(1)";
            cert.style.opacity = "1";
        }, 50);

        setTimeout(() => {
            const seal = document.getElementById('final-seal');
            seal.style.animation = "stampAction 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards";
        }, 1100);
    }
</script>

</body>
</html>
